<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - ADI FIX MERAH V12</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-icon"><i class="fas fa-crown"></i></div>
      <h1>ADI FIX MERAH</h1>
      <p>V12 Dashboard Edition</p>
      
      <div class="form-group">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="username" placeholder="Username" autocomplete="username">
        </div>
      </div>
      
      <div class="form-group">
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        </div>
      </div>
      
      <div id="login-error" class="alert alert-danger hidden"></div>
      
      <button class="btn btn-primary" id="login-btn" onclick="doLogin()">
        <i class="fas fa-sign-in-alt"></i> Masuk
      </button>
      
      <p class="text-muted text-xs mt-4">
        Default: admin / admin123
      </p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const toast = document.getElementById('toast');
    function showToast(msg, type='info') {
      toast.className = `toast toast-${type}`;
      toast.innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    async function doLogin() {
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      if (!username || !password) {
        err.innerText = 'Username dan password wajib diisi!';
        err.classList.remove('hidden');
        return;
      }
      
      btn.innerHTML = '<i class="fas fa-spinner spin"></i> Memuat...';
      btn.disabled = true;
      err.classList.add('hidden');
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('token', data.token);
          showToast('Login berhasil!', 'success');
          setTimeout(() => window.location.href = '/dashboard', 800);
        } else {
          err.innerText = data.message || 'Login gagal';
          err.classList.remove('hidden');
        }
      } catch (e) {
        err.innerText = 'Terjadi kesalahan. Coba lagi.';
        err.classList.remove('hidden');
      } finally {
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk';
        btn.disabled = false;
      }
    }

    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') doLogin();
    });

    // Check if already logged in
    const token = localStorage.getItem('token');
    if (token) {
      fetch('/api/auth/profile', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => r.json())
        .then(d => { if (d.success) window.location.href = '/dashboard'; })
        .catch(() => localStorage.removeItem('token'));
    }
  </script>
</body>
</html>
